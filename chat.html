<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>聊天室 💬</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8f9fa;
            --navbar: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: white;
            --text-color: #333;
            --border: #e0e0e0;
            --message-left: white;
            --message-right: #667eea;
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --navbar: linear-gradient(135deg, #1e1e2e 0%, #16213e 100%);
            --card-bg: #1e1e2e;
            --text-color: #eee;
            --border: #333;
            --message-left: #2d2d44;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes heartFloat {
            0% {
                transform: scale(0) translateY(0);
                opacity: 1;
            }
            50% {
                transform: scale(1.2) translateY(-30px);
                opacity: 0.8;
            }
            100% {
                transform: scale(0) translateY(-80px);
                opacity: 0;
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .navbar {
            background: var(--navbar);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideInRight 0.5s ease;
        }

        .navbar-left { display: flex; align-items: center; gap: 15px; }
        
        .back-btn, .refresh-btn, .theme-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover, .refresh-btn:hover, .theme-btn:hover { 
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .refresh-btn:active {
            animation: spin 0.5s ease;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message { 
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: column;
            animation: slideInLeft 0.4s ease;
        }
        
        .message-right {
            align-items: flex-end;
            animation: slideInRight 0.4s ease;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            transition: all 0.2s ease;
        }
        
        .message-left .message-bubble {
            background: var(--message-left);
            color: var(--text-color);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        
        .message-right .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-bubble:hover {
            transform: scale(1.02);
        }

        .message-meta { font-size: 11px; color: #999; margin-top: 5px; margin-left: 12px; margin-right: 12px; }
        
        .loading { 
            text-align: center; 
            color: #999; 
            padding: 20px;
            animation: pulse 1.5s infinite;
        }

        .input-area {
            padding: 20px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            animation: slideInUp 0.5s ease;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        
        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            background: var(--card-bg);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            border-color: #667eea;
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .message-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            resize: none;
            font-family: inherit;
            margin-bottom: 10px;
            background: var(--card-bg);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        
        .message-input:focus {
            border-color: #667eea;
            transform: scale(1.01);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .status { text-align: center; font-size: 12px; color: #999; margin-top: 10px; }
        .small-btn { background: transparent; border: 1px solid var(--border); color: var(--text-color); padding: 12px 15px; }
        .small-btn:hover { background: rgba(0,0,0,0.05); transform: scale(1.02); }

        /* 愛心漂浮特效容器 */
        .heart-container {
            position: fixed;
            bottom: 100px;
            right: 20px;
            pointer-events: none;
            z-index: 1000;
        }

        .floating-heart {
            position: absolute;
            font-size: 24px;
            animation: heartFloat 1s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <h1>💬 聊天室</h1>
        </div>
        <div>
            <button class="theme-btn" onclick="toggleTheme()">🌙</button>
            <button class="refresh-btn" onclick="loadMessagesWithAnimation()">🔄</button>
        </div>
    </div>

    <div class="messages-area" id="messagesArea"><div class="loading">📡 載入訊息中...</div></div>

    <div class="input-area">
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="你的名字" maxlength="20">
            <button id="clearNameBtn" class="small-btn">🗑️</button>
        </div>
        <textarea id="messageInput" class="message-input" rows="2" placeholder="輸入訊息... (按 Enter 發送)"></textarea>
        <button id="sendBtn" onclick="sendMessageWithHeart()">📤 發送訊息</button>
        <div class="status" id="status">✅ 已連線</div>
    </div>

    <div class="heart-container" id="heartContainer"></div>

    <audio id="notificationSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <script>
        const REPO_OWNER = 'zaxfreazy1229';
        const REPO_NAME = 'zaxfreazy1229.github.io';
        const ISSUE_NUMBER = 5;
        
        let lastMessageCount = 0;
        let notificationEnabled = true;
        
        const messagesArea = document.getElementById('messagesArea');
        const nameInput = document.getElementById('nameInput');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearNameBtn = document.getElementById('clearNameBtn');
        const statusDiv = document.getElementById('status');
        const notificationSound = document.getElementById('notificationSound');
        const heartContainer = document.getElementById('heartContainer');
        
        let currentName = localStorage.getItem('chatName') || '';
        nameInput.value = currentName;
        
        // 愛心噴發特效
        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '💘'][Math.floor(Math.random() * 6)];
            heart.style.left = (x || window.innerWidth / 2) + 'px';
            heart.style.bottom = (y || 100) + 'px';
            heartContainer.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        // 發送時噴愛心
        function sendMessageWithHeart() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createHeart(window.innerWidth / 2 + (Math.random() - 0.5) * 100, 100);
                }, i * 50);
            }
            sendMessage();
        }

        // 載入時動畫
        async function loadMessagesWithAnimation() {
            const refreshBtn = document.querySelector('.refresh-btn');
            refreshBtn.style.animation = 'spin 0.5s ease';
            setTimeout(() => {
                refreshBtn.style.animation = '';
            }, 500);
            await loadMessages();
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('chatTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('chatTheme', 'dark');
            }
        }
        
        const savedTheme = localStorage.getItem('chatTheme');
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        
        function playNotification() {
            if (notificationEnabled) {
                notificationSound.play().catch(e => console.log('音效播放失敗'));
            }
        }
        
        function setStatus(text, isError = false) {
            statusDiv.textContent = text;
            statusDiv.style.color = isError ? '#e74c3c' : '#999';
            setTimeout(() => { if (!isError) statusDiv.style.color = '#999'; }, 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadMessages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments?per_page=100`);
                if (!response.ok) throw new Error('載入失敗');
                const comments = await response.json();
                
                const wasEmpty = messagesArea.innerHTML === '<div class="loading">💬 還沒有訊息，來發第一條吧！</div>' || messagesArea.innerHTML.includes('還沒有訊息');
                
                if (comments.length === 0) {
                    messagesArea.innerHTML = '<div class="loading">💬 還沒有訊息，來發第一條吧！</div>';
                    lastMessageCount = 0;
                    return;
                }
                
                if (!wasEmpty && comments.length > lastMessageCount && lastMessageCount !== 0) {
                    playNotification();
                    setStatus(`🔔 有 ${comments.length - lastMessageCount} 則新訊息`);
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => createHeart(), i * 100);
                    }
                }
                
                lastMessageCount = comments.length;
                
                messagesArea.innerHTML = '';
                comments.reverse().forEach((comment, index) => {
                    const messageDiv = document.createElement('div');
                    let userName = '匿名';
                    let content = comment.body;
                    const pipeIndex = comment.body.indexOf('|');
                    if (pipeIndex !== -1) {
                        userName = comment.body.substring(0, pipeIndex);
                        content = comment.body.substring(pipeIndex + 1);
                    }
                    const isOwn = (userName === currentName);
                    messageDiv.className = `message ${isOwn ? 'message-right' : 'message-left'}`;
                    messageDiv.style.animationDelay = `${index * 0.05}s`;
                    const date = new Date(comment.created_at);
                    const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                    messageDiv.innerHTML = `
                        <div class="message-bubble">${escapeHtml(content)}</div>
                        <div class="message-meta">${escapeHtml(userName)} · ${timeStr}</div>
                    `;
                    messagesArea.appendChild(messageDiv);
                });
                messagesArea.scrollTop = messagesArea.scrollHeight;
                setStatus(`✅ 已載入 ${comments.length} 則訊息`);
            } catch (error) {
                messagesArea.innerHTML = '<div class="loading">❌ 載入失敗，請重新整理</div>';
                setStatus('❌ 載入失敗', true);
            }
        }
        
        async function sendMessage() {
            const name = nameInput.value.trim();
            const content = messageInput.value.trim();
            if (!name) { setStatus('❌ 請輸入名字', true); return; }
            if (!content) { setStatus('❌ 請輸入訊息', true); return; }
            
            localStorage.setItem('chatName', name);
            currentName = name;
            
            let token = localStorage.getItem('githubToken');
            if (!token) {
                token = prompt('請輸入 GitHub Personal Access Token：');
                if (!token) { setStatus('❌ 需要 Token 才能發送', true); return; }
                localStorage.setItem('githubToken', token);
            }
            
            const fullMessage = `${name}|${content}`;
            sendBtn.disabled = true;
            setStatus('📡 發送中...');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ body: fullMessage })
                });
                if (!response.ok) throw new Error('發送失敗');
                messageInput.value = '';
                setStatus('✅ 發送成功！');
                await loadMessages();
            } catch (error) {
                setStatus(`❌ 發送失敗: ${error.message}`, true);
                if (error.message.includes('401')) {
                    localStorage.removeItem('githubToken');
                    setStatus('❌ Token 無效，請重新輸入', true);
                }
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        function goBack() { window.location.href = 'index.html'; }
        function clearName() {
            localStorage.removeItem('chatName');
            nameInput.value = '';
            currentName = '';
            setStatus('🔄 名字已清除');
        }
        
        sendBtn.addEventListener('click', sendMessageWithHeart);
        clearNameBtn.addEventListener('click', clearName);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessageWithHeart(); }
        });
        nameInput.addEventListener('change', () => {
            const newName = nameInput.value.trim();
            if (newName) { localStorage.setItem('chatName', newName); currentName = newName; loadMessages(); }
        });
        
        loadMessages();
        setInterval(loadMessages, 2000);
    </script>
</body>
</html>
