<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 我的相簿</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 頂部導航欄 */
        .navbar {
            background: white;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: #667eea;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 25px;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: #764ba2;
        }

        .navbar h1 {
            font-size: 24px;
            color: #333;
        }

        .navbar p {
            color: #999;
            font-size: 14px;
        }

        /* 每一行的容器 */
        .row {
            background: white;
            border-radius: 20px;
            padding: 20px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .row-title {
            font-size: 22px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        /* 水平滾動容器 */
        .scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 15px 0;
            scroll-behavior: smooth;
            cursor: grab;
        }

        .scroll-container:active {
            cursor: grabbing;
        }

        /* 滾動條樣式 */
        .scroll-container::-webkit-scrollbar {
            height: 8px;
        }

        .scroll-container::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 10px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        /* 照片卡片容器 */
        .gallery {
            display: inline-flex;
            gap: 20px;
            padding: 0 20px;
        }

        /* 照片卡片 */
        .photo {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 15px;
            width: 260px;
            display: inline-block;
            white-space: normal;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .photo:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .photo img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
        }

        .photo p {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }

        /* 導航按鈕 */
        .nav-buttons {
            margin-top: 15px;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav-buttons button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .nav-buttons button:hover {
            background: #764ba2;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-left">
            <button class="back-btn" onclick="goBack()">← 返回首頁</button>
            <div>
                <h1>📸 我的相簿</h1>
                <p>生活瞬間 | 共9張照片</p>
            </div>
        </div>
    </div>

    <!-- 第一行：照片 1-3 -->
    <div class="row">
        <div class="row-title">📷 回憶精選 ①</div>
        <div class="scroll-container" id="scroll1">
            <div class="gallery">
                <div class="photo">
                    <img src="20260208_020939000_iOS.jpg" alt="大合照" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>大合照</p>
                </div>
                <div class="photo">
                    <img src="IMG_20260124_145424.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>美好時光</p>
                </div>
                <div class="photo">
                    <img src="IMG_20260124_145529.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>燦爛笑容</p>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button onclick="scrollRow('scroll1', -280)">◀ 向左</button>
            <button onclick="scrollRow('scroll1', 280)">向右 ▶</button>
        </div>
    </div>

    <!-- 第二行：照片 4-6 -->
    <div class="row">
        <div class="row-title">📷 回憶精選 ②</div>
        <div class="scroll-container" id="scroll2">
            <div class="gallery">
                <div class="photo">
                    <img src="IMG_20260124_140959.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>風景如畫</p>
                </div>
                <div class="photo">
                    <img src="IMG_20260124_141207.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>午後時光</p>
                </div>
                <div class="photo">
                    <img src="IMG_20260124_145756.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>夕陽美景</p>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button onclick="scrollRow('scroll2', -280)">◀ 向左</button>
            <button onclick="scrollRow('scroll2', 280)">向右 ▶</button>
        </div>
    </div>

    <!-- 第三行：照片 7-9 -->
    <div class="row">
        <div class="row-title">📷 回憶精選 ③</div>
        <div class="scroll-container" id="scroll3">
            <div class="gallery">
                <div class="photo">
                    <img src="mmexport1769262363531.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>開心時刻</p>
                </div>
                <div class="photo">
                    <img src="mmexport1769304880414.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>珍貴回憶</p>
                </div>
                <div class="photo">
                    <img src="mmexport1769304889558.jpg" alt="照片" onerror="this.src='https://via.placeholder.com/260x180?text=圖片+載入失敗'">
                    <p>快樂相聚</p>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button onclick="scrollRow('scroll2', -280)">◀ 向左</button>
            <button onclick="scrollRow('scroll2', 280)">向右 ▶</button>
        </div>
    </div>

    <footer>
        👆 每一行都可以獨立左右滑動 | 也可以用滑鼠直接拖曳
    </footer>

    <script>
        // 返回首頁
        function goBack() {
            window.location.href = 'index.html';
        }

        // 滑動函數
        function scrollRow(containerId, distance) {
            const container = document.getElementById(containerId);
            container.scrollBy({ left: distance, behavior: 'smooth' });
        }

        // 為每個滾動容器添加滑鼠拖曳功能
        function enableDragScroll(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            let isDown = false;
            let startX;
            let scrollLeftStart;
            
            container.addEventListener('mousedown', (e) => {
                isDown = true;
                container.style.cursor = 'grabbing';
                startX = e.pageX - container.offsetLeft;
                scrollLeftStart = container.scrollLeft;
            });
            
            container.addEventListener('mouseleave', () => {
                isDown = false;
                container.style.cursor = 'grab';
            });
            
            container.addEventListener('mouseup', () => {
                isDown = false;
                container.style.cursor = 'grab';
            });
            
            container.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const walk = (x - startX) * 1.5;
                container.scrollLeft = scrollLeftStart - walk;
            });
        }
        
        // 啟用所有行的拖曳功能
        enableDragScroll('scroll1');
        enableDragScroll('scroll2');
        enableDragScroll('scroll3');
    </script>
</body>
</html>
