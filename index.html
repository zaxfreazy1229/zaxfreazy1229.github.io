<!DOCTYPE html>
<html>
<head>
    <title>我的相簿</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .photo {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 300px;
        }
        .photo img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .photo p {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Welcome! 🎉</h1>
    <p>大合照 #Welcome!</p>

    <div class="gallery">
        <!-- 照片 1 -->
        <div class="photo">
            <img src="20260208_020939000_iOS.jpg" alt="大合照">
            <p>大合照</p>
        </div>

        <!-- 照片 2 -->
        <div class="photo">
            <img src="IMG_20260124_145424.jpg" alt="照片描述">
            <p>黎裏小院</p>
        </div>

        <!-- 照片 3 -->
        <div class="photo">
            <img src="IMG_20260124_145529.jpg" alt="照片描述">
            <p>黎裏小院BiliBili</p>
        </div>
    </div>
</body>
</html>
