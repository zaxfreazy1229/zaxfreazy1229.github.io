<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: white;
            --text-color: #333;
            --text-secondary: #666;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: #1e1e2e;
            --text-color: #eee;
            --text-secondary: #aaa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* 頂部工具欄 */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
        }

        .theme-btn, .reset-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 30px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .theme-btn:hover, .reset-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* 訪客計數器 */
        .counter {
            text-align: center;
            background: rgba(255,255,255,0.15);
            display: inline-block;
            width: auto;
            margin: 0 auto 30px;
            padding: 10px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .counter span {
            font-size: 28px;
            font-weight: bold;
            margin-right: 5px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #667eea;
        }

        [data-theme="dark"] .card h2 {
            color: #8b5cf6;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <button class="reset-btn" onclick="resetCounter()">🔄 重置計數</button>
            <button class="theme-btn" onclick="toggleTheme()">🌙 深色模式</button>
        </div>

        <h1>🚀 我的個人網站</h1>
        <p class="subtitle">歡迎來到我的小天地！</p>

        <!-- 訪客計數器 -->
        <div style="text-align: center;">
            <div class="counter">
                👁️ 已有 <span id="visitorCount">0</span> 人訪問
            </div>
        </div>
        
        <div class="cards">
            <a href="chat.html" class="card">
                <div class="card-icon">💬</div>
                <h2>聊天室</h2>
                <p>即時聊天，訊息永久保存！支援深色模式、通知音效。</p>
            </a>

            <a href="gallery.html" class="card">
                <div class="card-icon">📸</div>
                <h2>我的相簿</h2>
                <p>精選照片集，點擊可放大，支援編輯說明。</p>
            </a>

            <a href="#" class="card">
                <div class="card-icon">✨</div>
                <h2>更多功能</h2>
                <p>敬請期待！正在開發中...</p>
            </a>
        </div>
        
        <footer>
            © 2026 zaxfreazy1229 | 由 GitHub Pages 提供支援
        </footer>
    </div>

    <script>
        // 深色模式
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.querySelector('.theme-btn').textContent = '🌙 深色模式';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.querySelector('.theme-btn').textContent = '☀️ 淺色模式';
            }
        }

        // 載入儲存的主題
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-btn').textContent = '☀️ 淺色模式';
        }

        // 訪客計數器
        let count = localStorage.getItem('visitorCount') || 1;
        document.getElementById('visitorCount').textContent = count;

        function resetCounter() {
            if (confirm('確定要重置訪客計數器嗎？')) {
                localStorage.setItem('visitorCount', 1);
                document.getElementById('visitorCount').textContent = 1;
            }
        }
    </script>
</body>
</html>
