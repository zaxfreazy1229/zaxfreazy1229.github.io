<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 GitHub Pages 聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .messages-area {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        /* 訊息樣式 */
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message-left {
            align-items: flex-start;
        }

        .message-right {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message-left .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message-right .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-meta {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            margin-left: 12px;
            margin-right: 12px;
        }

        /* 輸入區 */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
        }

        .message-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            resize: none;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        .refresh-btn {
            background: transparent;
            color: #667eea;
            border: 1px solid #667eea;
            padding: 5px 15px;
            font-size: 12px;
        }

        .refresh-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 GitHub 聊天室</h1>
            <p>Issue #5 · 歡迎大家一起聊天</p>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="loading">📡 載入訊息中...</div>
        </div>

        <div class="input-area">
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="你的名字" maxlength="20" value="訪客">
                <button id="clearNameBtn" class="refresh-btn" style="padding: 12px 15px;">🗑️</button>
                <button id="refreshBtn" class="refresh-btn" style="padding: 12px 15px;">🔄</button>
            </div>
            <textarea id="messageInput" class="message-input" rows="2" placeholder="輸入訊息... (按 Enter 發送)"></textarea>
            <button id="sendBtn">📤 發送訊息</button>
            <div class="status" id="status">✅ 已連線</div>
        </div>
    </div>

    <script>
        // 設定
        const REPO_OWNER = 'zaxfreazy1229';
        const REPO_NAME = 'zaxfreazy1229.github.io';
        const ISSUE_NUMBER = 5;
        
        // DOM 元素
        const messagesArea = document.getElementById('messagesArea');
        const nameInput = document.getElementById('nameInput');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const clearNameBtn = document.getElementById('clearNameBtn');
        const statusDiv = document.getElementById('status');
        
        // 儲存的名字
        let currentName = localStorage.getItem('chatName') || '訪客';
        nameInput.value = currentName;
        
        // 更新狀態
        function setStatus(text, isError = false) {
            statusDiv.textContent = text;
            statusDiv.style.color = isError ? '#e74c3c' : '#999';
            setTimeout(() => {
                if (!isError) {
                    statusDiv.style.color = '#999';
                }
            }, 3000);
        }
        
        // 從 GitHub 載入留言
        async function loadMessages() {
            try {
                messagesArea.innerHTML = '<div class="loading">📡 載入訊息中...</div>';
                
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments?per_page=100`);
                
                if (!response.ok) throw new Error('載入失敗');
                
                const comments = await response.json();
                
                if (comments.length === 0) {
                    messagesArea.innerHTML = '<div class="loading">💬 還沒有訊息，來發第一條吧！</div>';
                    return;
                }
                
                // 顯示留言（最新的在下面）
                messagesArea.innerHTML = '';
                comments.reverse().forEach(comment => {
                    const messageDiv = createMessageElement(comment);
                    messagesArea.appendChild(messageDiv);
                });
                
                // 滾動到底部
                messagesArea.scrollTop = messagesArea.scrollHeight;
                
                setStatus(`✅ 已載入 ${comments.length} 則訊息`);
            } catch (error) {
                console.error(error);
                messagesArea.innerHTML = '<div class="loading">❌ 載入失敗，請重新整理</div>';
                setStatus('❌ 載入失敗', true);
            }
        }
        
        // 建立訊息元素
        function createMessageElement(comment) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-left';
            
            // 解析自定義格式：姓名|內容
            let userName = '匿名';
            let content = comment.body;
            
            // 檢查是否符合 "姓名|內容" 格式
            const pipeIndex = comment.body.indexOf('|');
            if (pipeIndex !== -1) {
                userName = comment.body.substring(0, pipeIndex);
                content = comment.body.substring(pipeIndex + 1);
            }
            
            // 檢查是否是自己發送的（比對本地儲存的名字）
            const isOwn = (userName === currentName);
            if (isOwn) {
                messageDiv.className = 'message message-right';
            }
            
            const date = new Date(comment.created_at);
            const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
            
            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(content)}</div>
                <div class="message-meta">${escapeHtml(userName)} · ${timeStr}</div>
            `;
            
            return messageDiv;
        }
        
        // 防 XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 發送訊息
        async function sendMessage() {
            const name = nameInput.value.trim();
            const content = messageInput.value.trim();
            
            if (!name) {
                setStatus('❌ 請輸入名字', true);
                return;
            }
            
            if (!content) {
                setStatus('❌ 請輸入訊息', true);
                return;
            }
            
            if (content.length > 500) {
                setStatus('❌ 訊息太長（最多500字）', true);
                return;
            }
            
            // 儲存名字
            localStorage.setItem('chatName', name);
            currentName = name;
            
            // 組合訊息：姓名|內容
            const fullMessage = `${name}|${content}`;
            
            sendBtn.disabled = true;
            setStatus('📡 發送中...');
            
            try {
                // 建立 GitHub Personal Access Token
                // 注意：你需要提供一個 token
                const token = prompt('請輸入 GitHub Personal Access Token (需要有 repo 權限)\n\n如何取得：Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token\n勾選 repo 權限');
                
                if (!token) {
                    setStatus('❌ 需要 Token 才能發送', true);
                    sendBtn.disabled = false;
                    return;
                }
                
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${ISSUE_NUMBER}/comments`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        body: fullMessage
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '發送失敗');
                }
                
                messageInput.value = '';
                setStatus('✅ 發送成功！');
                await loadMessages();
                
            } catch (error) {
                console.error(error);
                setStatus(`❌ 發送失敗: ${error.message}`, true);
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        // 清除名字
        function clearName() {
            localStorage.removeItem('chatName');
            nameInput.value = '';
            currentName = '';
            setStatus('🔄 名字已清除');
        }
        
        // 事件監聽
        sendBtn.addEventListener('click', sendMessage);
        refreshBtn.addEventListener('click', loadMessages);
        clearNameBtn.addEventListener('click', clearName);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        nameInput.addEventListener('change', () => {
            const newName = nameInput.value.trim();
            if (newName) {
                localStorage.setItem('chatName', newName);
                currentName = newName;
                loadMessages(); // 重新載入以更新"自己"的樣式
            }
        });
        
        // 初次載入
        loadMessages();
        
        // 每 10 秒自動刷新
        setInterval(() => {
            loadMessages();
        }, 10000);
    </script>
</body>
</html>
