<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            margin-bottom: 50px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .card p {
            color: #666;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 我的個人網站</h1>
        <p class="subtitle">歡迎來到我的小天地！選擇你想探索的功能</p>
        
        <div class="cards">
            <!-- 聊天室卡片 -->
            <a href="chat.html" class="card">
                <div class="card-icon">💬</div>
                <h2>聊天室</h2>
                <p>即時聊天，和其他訪客交流！使用 GitHub Issues 技術，訊息永久保存。</p>
            </a>

            <!-- 相簿卡片 -->
            <a href="gallery.html" class="card">
                <div class="card-icon">📸</div>
                <h2>我的相簿</h2>
                <p>精選照片集，記錄生活中的美好時刻。</p>
            </a>

            <!-- 預留功能 -->
            <a href="#" class="card">
                <div class="card-icon">✨</div>
                <h2>更多功能</h2>
                <p>敬請期待！正在開發中...</p>
            </a>
        </div>
        
        <footer>
            © 2026 zaxfreazy1229 | 由 GitHub Pages 提供支援
        </footer>
    </div>
</body>
</html>
